# sample hyprlock.conf
# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
#
# rendered text in all widgets supports pango markup (e.g. <b> or <i> tags)
# ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#general-remarks
#
# shortcuts to clear password buffer: ESC, Ctrl+U, Ctrl+Backspace
#
# you can get started by copying this config to ~/.config/hypr/hyprlock.conf
#

$font = JetBrainsMono NFM

general {
    hide_cursor = true
    ignore_empty_input = true
    fail_timeout = 2000

}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor = 
    path = screenshot
    blur_size = 2
    blur_passes = 4
}

input-field {
    monitor = DP-3
    size = 20%, 5%
    outline_thickness = 0
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    #XXXXXXee
    outer_color = rgba(0096ff00) rgba(9600ff00) 45deg
    check_color = rgba(0096ff00) rgba(9600ff00) 225deg
    fail_color = rgba(ff700000) rgba(ff000000) 45deg

    font_color = rgb(143, 143, 143)
    fade_on_empty = true
    rounding = 15

    font_family = $font
    placeholder_text = 
    fail_text = $PAMFAIL

    # uncomment to use a letter instead of a dot to indicate the typed password
    # dots_text_format = *
    # dots_size = 0.4
    dots_spacing = 1

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 0, 0
    halign = center
    valign = center
}

# TIME
label {
    monitor = DP-2
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 90
    font_family = $font

    position = 0, 0
    halign = center
    valign = center
}

# DATE
label {
    monitor = DP-2
    text = cmd[update:15000] date +"%A, %d %B %Y"
    font_size = 25
    font_family = $font

    position = 0, -100
    halign = center
    valign = center
}

# LOCKED SINCE
label {
    monitor = DP-2
    text = cmd[once] rm -f /tmp/hyprlock_time
    font_size = 0
    position = 0, 0
    halign = center
    valign = bottom
}

label {
    monitor = DP-2
    text = cmd[update:1000] bash -c 'LOCKFILE="/tmp/hyprlock_time"; [ -f "$LOCKFILE" ] || date +%s > "$LOCKFILE"; now=$(date +%s); start=$(cat "$LOCKFILE"); diff=$((now - start)); printf "Locked for\n %02d:%02d:%02d\n" $((diff/3600)) $(((diff/60)%60)) $((diff%60))'
    font_size = 18
    font_family = $font
    font_color = rgb(143, 143, 143)

    position = 0, 30
    halign = center
    valign = bottom
}
